name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  SCHEME: OralScribe
  ARCHIVE_PATH: build/OralScribe.xcarchive
  EXPORT_PATH: build/export
  DMG_PATH: build/OralScribe.dmg

jobs:
  release:
    name: Build, Sign & Notarize
    runs-on: macos-15
    permissions:
      contents: write  # create release + push cask update

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # need full branch history for the cask commit push

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Signing ──────────────────────────────────────────────────────────

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PWD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      # ── Archive ──────────────────────────────────────────────────────────

      - name: Write ExportOptions.plist
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>${{ secrets.MACOS_IDENTITY }}</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

      - name: Archive
        run: |
          xcodebuild archive \
            -project OralScribe.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.MACOS_IDENTITY }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Re-sign with entitlements
        run: |
          codesign --force --options runtime \
            --entitlements OralScribe/OralScribe.entitlements \
            --sign "${{ secrets.MACOS_IDENTITY }}" \
            "$EXPORT_PATH/OralScribe.app"

      - name: Verify entitlements
        run: |
          echo "Embedded entitlements:"
          codesign -d --entitlements :- "$EXPORT_PATH/OralScribe.app"
          echo ""
          echo "Signature verification:"
          codesign --verify --deep --strict "$EXPORT_PATH/OralScribe.app"

      # ── Notarization ─────────────────────────────────────────────────────

      - name: Notarize
        run: |
          ditto -c -k --keepParent \
            "$EXPORT_PATH/OralScribe.app" \
            build/OralScribe-notarize.zip

          xcrun notarytool submit build/OralScribe-notarize.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "$EXPORT_PATH/OralScribe.app"

      # ── DMG ──────────────────────────────────────────────────────────────

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Oral Scribe" \
            -srcfolder "$EXPORT_PATH/OralScribe.app" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      # ── Cask update ──────────────────────────────────────────────────────

      - name: Update Homebrew cask sha256
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          sed -i '' \
            -e "s/version \".*\"/version \"$VERSION\"/" \
            -e "s/sha256 .*/sha256 \"$SHA\"/" \
            Casks/oral-scribe.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/oral-scribe.rb
          git commit -m "chore: update cask to v$VERSION"
          git push origin HEAD:main

      # ── Release ──────────────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
