name: OralScribe
options:
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  generateEmptyDirectories: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.9.0
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper
    from: 1.0.0

targets:
  OralScribe:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: OralScribe
        excludes:
          - "Resources/AppIcon.svg"   # source file only, not needed in bundle
    info:
      path: OralScribe/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Oral Scribe needs microphone access to record your voice."
        NSSpeechRecognitionUsageDescription: "Oral Scribe uses speech recognition to transcribe your voice."
        NSAppleEventsUsageDescription: "Oral Scribe needs Apple Events access to create notes in Apple Notes."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSExceptionMinimumTLSVersion: TLSv1.0
              NSIncludesSubdomains: true
        CFBundleName: Oral Scribe
        CFBundleDisplayName: Oral Scribe
        CFBundleIdentifier: com.oralscribe.app
        CFBundleVersion: "6"
        CFBundleShortVersionString: "1.3.2"
        NSHumanReadableCopyright: "Copyright © 2026 Oral Scribe. All rights reserved."
        LSMinimumSystemVersion: "13.0"
        CFBundleIconFile: AppIcon
    entitlements:
      path: OralScribe/OralScribe.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.personal-information.speech-recognition: true
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oralscribe.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
      - package: SwiftWhisper

  OralScribeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: OralScribeTests
    dependencies:
      - target: OralScribe
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
